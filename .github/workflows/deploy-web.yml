# v 1.0.0.3
name: Deploy Flutter Web

on:
  push:
    branches:
      - dev
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Select deploy path by branch
        id: branch_path
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "TARGET_PATH=/home/sergeismv/apps/portfolio" >> $GITHUB_ENV
          else
            echo "TARGET_PATH=/home/sergeismv/apps/webtest" >> $GITHUB_ENV
          fi

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "SSH_HOST is empty"; exit 1
          fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "SSH_USER is empty"; exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "SSH_PRIVATE_KEY is empty"; exit 1
          fi
          if [ -z "${{ secrets.SSH_PORT }}" ]; then
            echo "SSH_PORT is empty"; exit 1
          fi

          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 10 -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts || \
            echo "ssh-keyscan failed, using StrictHostKeyChecking=accept-new during deploy"

      - name: Validate private key format
        run: |
          set -euo pipefail
          ls -la ~/.ssh
          wc -c ~/.ssh/id_ed25519
          ssh-keygen -yf ~/.ssh/id_ed25519 >/dev/null
          echo "KEY_PARSE_OK"

      - name: Validate key fingerprint
        run: |
          set -euo pipefail
          EXPECTED_FP="SHA256:K6GcktRUafDiiFUkYkubvqx8rgObOhHX5aDGui4UEzA"
          ACTUAL_FP="$(ssh-keygen -lf ~/.ssh/id_ed25519 | awk '{print $2}')"
          echo "CI key fingerprint: ${ACTUAL_FP}"
          if [ "${ACTUAL_FP}" != "${EXPECTED_FP}" ]; then
            echo "Fingerprint mismatch. Expected ${EXPECTED_FP}, got ${ACTUAL_FP}"
            exit 1
          fi
          echo "FINGERPRINT_OK"

      - name: SSH connectivity test
        run: |
          set -euo pipefail
          ssh -vvv -i ~/.ssh/id_ed25519 \
            -p "${{ secrets.SSH_PORT }}" \
            -o IdentitiesOnly=yes \
            -o PreferredAuthentications=publickey \
            -o PasswordAuthentication=no \
            -o KbdInteractiveAuthentication=no \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "echo CI_SSH_OK"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=accept-new" \
            build/web/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${TARGET_PATH}/"