<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="Sergei Semenov — Senior Flutter Developer. Портфолио: мобильные, веб- и десктоп-приложения на Flutter с Clean Architecture и нативной интеграцией.">
  <meta name="keywords" content="Flutter, Dart, Mobile Developer, BLE, IoT, Clean Architecture, BLoC, Portfolio">
  <meta name="author" content="Sergei Semenov">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Sergei Semenov — Flutter Developer">
  <meta property="og:description" content="Портфолио Flutter-разработчика: мобильные, веб и десктоп приложения.">
  <meta property="og:locale" content="ru_RU">

  <meta name="theme-color" content="#0E0F13">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sergei Semenov Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sergei Semenov — Flutter Developer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0E0F13;
      color: #F7F7F8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background-color: #0E0F13;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #app-loader.hidden { opacity: 0; pointer-events: none; }
    .dot {
      display: inline-block;
      width: 10px; height: 10px; border-radius: 50%;
      background: #5B8DEF; margin: 0 4px;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    .loader-text {
      margin-top: 16px;
      opacity: 0.55;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="app-loader">
    <div>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <div class="loader-text">Загрузка портфолио</div>
  </div>

  <noscript>
    <div style="max-width: 640px; margin: 80px auto; padding: 24px; font-family: sans-serif;">
      <h1>Sergei Semenov — Flutter Developer</h1>
      <p>Портфолио Flutter-разработчика с опытом мобильной, веб- и десктоп-разработки, BLE/IoT и нативной интеграции.</p>
      <p>Для интерактивного просмотра сайта необходим включённый JavaScript.</p>
    </div>
  </noscript>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('app-loader');
      if (el) {
        el.classList.add('hidden');
        setTimeout(function () { el.remove(); }, 500);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
